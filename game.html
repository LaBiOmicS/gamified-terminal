<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAMAS Retro Emulator</title>
    <style type="text/css">
      body, html { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #dosbox { 
        width: 100%; 
        height: 100%; 
      }
      .loading {
        color: #0dbc79;
        font-family: monospace;
        position: absolute;
        text-align: center;
        z-index: 10;
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div id="dosbox"></div>
    <div id="status" class="loading">
      [ CARREGANDO SIMULADOR ]<br>
      <small>Pressione qualquer tecla para interagir se necessário</small>
    </div>

    <!-- Usando a versão estável 6.22 do js-dos -->
    <script type="text/javascript" src="https://js-dos.com/6.22/current/js-dos.js"></script>
    <script type="text/javascript">
      var params = new URLSearchParams(window.location.search);
      var game = params.get("game");
      var status = document.getElementById("status");

      var games = {
        "doom": {
          zip: "https://js-dos.com/cdn/upload/DOOM-@evilution.zip",
          exe: "DOOM.EXE",
          dir: "DOOM"
        },
        "duke": {
          zip: "https://js-dos.com/cdn/upload/DUKE3D.zip",
          exe: "DUKE3D.EXE",
          dir: "DUKE3D"
        }
      };

      if (games[game]) {
        Dos(document.getElementById("dosbox"), {
          wdosboxUrl: "https://js-dos.com/6.22/current/wdosbox.js"
        }).ready(function (fs, main) {
          fs.extract(games[game].zip).then(function () {
            status.style.display = "none";
            // Executa o comando para entrar na pasta e rodar o executável
            main(["-c", "cd " + games[game].dir, "-c", games[game].exe]).then(function (ci) {
              console.log("Simulador iniciado com sucesso.");
              window.ci = ci;
            });
          });
        });
      } else {
        status.innerHTML = "<span style='color: #ff4d4d'>ERRO: JOGO NÃO ENCONTRADO</span>";
      }
    </script>
  </body>
</html>
