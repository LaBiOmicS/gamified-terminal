<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>ARAMAS Retro Emulator</title>
    <style type="text/css">
      body, html { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #000;
      }
      #dosbox { 
        width: 100%; 
        height: 100%; 
      }
      /* Ajuste para o canvas do js-dos preencher o container */
      .dosbox-container { width: 100%; height: 100%; }
      canvas { width: 100% !important; height: 100% !important; object-fit: contain; }
      
      .loading {
        color: #0dbc79;
        font-family: monospace;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="dosbox"></div>
    <div id="status" class="loading">
      [ INICIALIZANDO SIMULADOR ]
    </div>
    
    <script type="text/javascript" src="https://js-dos.com/cdn/js-dos-api.js"></script>
    <script type="text/javascript">
      var params = new URLSearchParams(window.location.search);
      var game = params.get("game");
      var status = document.getElementById("status");

      var games = {
        "doom": {
          zip: "https://js-dos.com/cdn/upload/DOOM-@evilution.zip",
          exe: "./doom"
        },
        "duke": {
          zip: "https://js-dos.com/cdn/upload/DUKE3D.zip",
          exe: "./duke3d"
        }
      };

      if (games[game]) {
        var dosbox = new Dosbox({
          id: "dosbox",
          onload: function (dosbox) {
            status.style.display = "none";
            dosbox.run(games[game].zip, games[game].exe);
          },
          onrun: function (dosbox, app) {
            console.log("App '" + app + "' is running");
          }
        });
      } else {
        status.innerHTML = "<span style='color: #ff4d4d'>ERRO: JOGO NÃO ENCONTRADO</span>";
      }
    </script>
  </body>
</html>
