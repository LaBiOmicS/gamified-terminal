<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAMAS Retro Emulator</title>
    <style type="text/css">
      body, html { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #000;
      }
      #dosbox { 
        width: 100%; 
        height: 100%; 
      }
      .dosbox-container { width: 100%; height: 100%; }
      .loading {
        color: #0dbc79;
        font-family: monospace;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="dosbox"></div>
    <div id="status" class="loading">
      [ CARREGANDO SIMULADOR ]
    </div>

    <!-- Usando o script legado solicitado que tem maior compatibilidade com os links de upload -->
    <script type="text/javascript" src="https://js-dos.com/cdn/js-dos-api.js"></script>
    <script type="text/javascript">
      var params = new URLSearchParams(window.location.search);
      var game = params.get("game");
      var status = document.getElementById("status");

      var games = {
        "doom": {
          url: "upload/DOOM-@evilution.zip",
          exe: "./DOOM.EXE"
        },
        "duke": {
          url: "upload/DUKE3D.zip",
          exe: "./DUKE3D.EXE"
        }
      };

      if (games[game]) {
        var dosbox = new Dosbox({
          id: "dosbox",
          onload: function (dosbox) {
            status.style.display = "none";
            // O caminho no script legado é relativo a https://js-dos.com/
            dosbox.run(games[game].url, games[game].exe);
          },
          onrun: function (dosbox, app) {
            console.log("App '" + app + "' iniciado");
          }
        });
      } else {
        status.innerHTML = "<span style='color: #ff4d4d'>ERRO: JOGO NÃO ENCONTRADO</span>";
      }
    </script>
  </body>
</html>
